<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore</title>
    <link rel="stylesheet" href="./gestore.css">
</head>
<body>
    <header>
        <div class="brand">Gestore</div>
        <p class="subtitle">Gestión simple de clientes, productos y pedidos.</p>
    </header>

    <main>
        <nav>
            <button type="button" onclick="showSection('clientes')">Clientes</button>
            <button type="button" onclick="showSection('productos')">Productos</button>
            <button type="button" onclick="showSection('pedidos')">Pedidos</button>
        </nav>

        <section id="clientes" class="panel active">
            <h2>Clientes</h2>
            <form id="cliente-form">
                <input type="text" id="cliente-nombre" placeholder="Nombre" required>
                <input type="email" id="cliente-email" placeholder="Email" required>
                <input type="text" id="cliente-telefono" placeholder="Teléfono">
                <input type="text" id="cliente-direccion" placeholder="Dirección">
                <button type="submit">Crear cliente</button>
            </form>
            <div class="list-container">
                <h3>Clientes registrados</h3>
                <ul id="cliente-list"></ul>
            </div>
        </section>

        <section id="productos" class="panel">
            <h2>Productos</h2>
            <form id="producto-form">
                <input type="text" id="producto-nombre" placeholder="Nombre" required>
                <input type="text" id="producto-descripcion" placeholder="Descripción">
                <input type="number" id="producto-precio" placeholder="Precio" step="0.01" required>
                <input type="number" id="producto-stock" placeholder="Stock" required>
                <button type="submit">Crear producto</button>
            </form>
            <div class="list-container">
                <h3>Productos activos</h3>
                <ul id="producto-list"></ul>
            </div>
        </section>

        <section id="pedidos" class="panel">
            <h2>Pedidos</h2>
            <form id="pedido-form">
                <select id="pedido-cliente" required>
                    <option value="">Seleccione cliente</option>
                </select>
                <select id="pedido-producto" required>
                    <option value="">Seleccione producto</option>
                </select>
                <input type="number" id="pedido-cantidad" placeholder="Cantidad" min="1" value="1" required>
                <input type="text" id="pedido-direccion" placeholder="Dirección de entrega" required>
                <button type="submit">Crear pedido</button>
            </form>
            <div class="list-container">
                <h3>Pedidos recientes</h3>
                <ul id="pedido-list"></ul>
            </div>
        </section>

        <div id="message" class="message"></div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
